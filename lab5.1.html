<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #e0e0e0; }
        .kvadrat {
            width: 150px;
            height: 150px;
            position: absolute; 
        }

        .yasil {
            background-color: green;
            top: 50px;
            left: 50px;
        }

        .mavi {
            background-color: blue;
            top: 50px;
            left: 210px;
        }

        .sari {
            background-color: yellow;
            top: 150px;
            left: 110px;
            z-index: 1; 
        }

        .qirmizi {
            background-color: red;
            top: 150px;
            left: 270px;
        }
    </style>
</head>
<body>

    <div class="kvadrat yasil"></div>
    <div class="kvadrat mavi"></div>
    <div class="kvadrat sari"></div>
    <div class="kvadrat qirmizi"></div>

</body>
</html>
